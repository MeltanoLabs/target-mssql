
# This file can be used to customize tox tests as well as other test frameworks like mypy

[tox]
envlist = py39
; envlist = py37, py38, py39
isolated_build = true

[testenv]
allowlist_externals = poetry
commands =
    poetry install -v
    poetry run pytest
    poetry run ruff format --check target_mssql
    poetry run ruff check target_mssql

[testenv:pytest]
# Run the python tests.
# To execute, run `tox -e pytest`
envlist = py37, py38, py39
commands =
    poetry install -v
    poetry run pytest

[testenv:format]
# Attempt to auto-resolve lint errors before they are raised.
# To execute, run `tox -e format`
commands =
    poetry install -v
    poetry run ruff format target_mssql
    poetry run ruff check --fix target_mssql

[testenv:lint]
# Raise an error if lint and style standards are not met.
# To execute, run `tox -e lint`
commands =
    poetry install -v
    poetry run ruff format --check --diff target_mssql
    poetry run ruff check target_mssql

[pydocstyle]
ignore = D105,D203,D213
