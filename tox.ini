
# This file can be used to customize tox tests as well as other test frameworks like mypy

[tox]
envlist = py310
isolated_build = true

[testenv]
description = "run tests on Python {py_dot_ver}"
dependency_groups =
    lint
commands =
    ruff format --check target_mssql
    ruff check target_mssql

[testenv:pytest]
# Run the python tests.
# To execute, run `tox -e pytest`
envlist = py3{10-14}
dependency_groups =
    test
commands =
    pytest

[testenv:format]
# Attempt to auto-resolve lint errors before they are raised.
# To execute, run `tox -e format`
description = "format code"
dependency_groups =
    lint
commands =
    ruff format target_mssql
    ruff check --fix target_mssql

[testenv:lint]
# Raise an error if lint and style standards are not met.
# To execute, run `tox -e lint`
description = "lint code"
dependency_groups =
    lint
commands =
    ruff format --check --diff target_mssql
    ruff check target_mssql
