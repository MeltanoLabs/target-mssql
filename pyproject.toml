[tool.poetry]
name = "target-mssql"
version = "0.2.1"
requires-poetry = ">=2"
description = "`target-mssql` is a Singer target for mssql, built with the Meltano SDK for Singer Targets."
authors = ["Henning Holgersen"]
keywords = ["ELT", "mssql", "Meltano", "SQL Server"]
license = "Apache 2.0"

[tool.poetry.dependencies]
python = "^3.9"
requests = "^2.25.1"
singer-sdk = "^0.48.1"
pymssql = "^2.3.11"
pyodbc = { version = ">=5,<6", optional = true }
sqlalchemy = "^2"
typing-extensions = { version = "^4.15.0", python = "<3.12" }

[tool.poetry.extras]
pyodbc = ["pyodbc"]

[tool.poetry.group.dev.dependencies]
pytest = "^6.2.5"
tox = "^3.24.4"
mypy = "^0.910"
types-requests = "^2.26.1"
ruff = ">=0.15"

[tool.ruff]
line-length = 120
src = ["target_mssql"]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "C90",
    "S",
    "UP",
    "SIM",
    "C4",
    "FURB",
    "PERF",
    "FLY",
    "B",
    "TRY",
    "EM",
]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.isort]
known-first-party = ["target_mssql"]

[build-system]
requires = ["poetry-core>=1.0.8"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.scripts]
# CLI declaration
target-mssql = 'target_mssql.target:Targetmssql.cli'
