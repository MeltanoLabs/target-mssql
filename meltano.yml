version: 1
environments:
- name: dev
- name: staging
- name: prod
default_environment: prod
send_anonymous_usage_stats: true
project_id: target-mssql
plugins:
  extractors:
  - name: tap-smoke-test
    variant: meltano
    pip_url: git+https://github.com/meltano/tap-smoke-test.git
    config:
      streams:
      - stream_name: animale
        input_filename: https://raw.githubusercontent.com/meltano/tap-smoke-test/refs/heads/main/demo-data/animals-data.jsonl
  - name: tap-spreadsheets-anywhere
    variant: Matatika
    namespace: tap_spreadsheets_anywhere
    pip_url: git+https://github.com/Matatika/tap-spreadsheets-anywhere.git@v0.5.1
    settings:
    - name: tables
      kind: array
      label: Tables
      description: A collection of related data organized in rows and columns.
    config:
      tables: [
        {
          "path":"https://assets.publishing.service.gov.uk/media/66797f66921ddc8344a00f3e/",
          "name":"weekly_fuel_prices",
          "pattern":"weekly_fuel_prices_240624.csv",
          "field_names":["Date","ULSP_per_litre","ULSD_per_litre","ULSP_duty","ULSD_duty","ULSP_vat_pc","ULSD_vat_pc"],
          "start_date":"2018-01-01T00:00:00Z",
          "skip_initial": 1,
          "key_properties":["Date"],
          "format":"csv"
        },
        {
          "path":"https://assets.publishing.service.gov.uk/media/65a5612e867cd8000d5ae8f0/",
          "name":"weekly_fuel_prices_2003_to_2017",
          "pattern":"weekly_fuel_prices_2003_to_2017.csv",
          "field_names":["Date","ULSP_per_litre","ULSD_per_litre","ULSP_duty","ULSD_duty","ULSP_vat_pc","ULSD_vat_pc"],
          "start_date":"2003-09-06T00:00:00Z",
          "skip_initial": 1,
          "key_properties":["Date"],
          "format":"csv"
        }
      ]
  loaders:
  - name: target-mssql
    namespace: target_mssql
    pip_url: -e .[pyodbc]
    capabilities:
    - about
    - schema-flattening
    - stream-maps
    - structured-logging
    settings:
    - name: sqlalchemy_url
      kind: string
      label: SQLAlchemy URL
      description: SQLAlchemy connection string
    - name: username
      kind: string
      label: Username
      description: SQL Server username
    - name: password
      kind: string
      label: Password
      description: SQL Server password
      sensitive: true
    - name: host
      kind: string
      label: Host
      description: SQL Server host
    - name: port
      kind: string
      value: '1433'
      label: Port
      description: SQL Server port
    - name: database
      kind: string
      label: Database
      description: SQL Server database
    - name: default_target_schema
      kind: string
      label: Default Target Schema
      description: Default target schema to write to
    - name: table_prefix
      kind: string
      label: Table Prefix
      description: Prefix to add to table name
    - name: prefer_float_over_numeric
      kind: boolean
      value: false
      label: Prefer Float Over Numeric
      description: Use float data type for numbers (otherwise number type is used)
    - name: driver
      kind: string
      value: pyodbc
      label: Driver
      description: The driver to use for the database connection (pymssql or pyodbc)
    - name: odbc_driver
      kind: string
      label: ODBC Driver
      description: The ODBC driver to use when driver=pyodbc (e.g. 'ODBC Driver 18 for SQL Server')
      value: ODBC Driver 18 for SQL Server
    - name: trust_server_certificate
      kind: boolean
      value: true
      label: Trust Server Certificate
      description: Trust the server certificate without validation (useful for self-signed certs)
